name: Make release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  release-for-github:
    name: "Release for GitHub"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Setup JDK 17 (Required for Gradle 9+)
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release with Gradle (Using JDK 17)
        run: ./gradlew assembleDefaultRelease --stacktrace

      - name: Setup JDK 11 (Temporary switch for Signing compatibility)
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 11

      - name: Sign APKs (Using JDK 11)
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/default/release
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename and Prepare Artifacts
        run: |
          set -euo pipefail
          VERSION_TAG=${GITHUB_REF#refs/tags/}
          
          echo "📦 Processing signed APKs..."
          find app/build/outputs/apk/default/release -name "*-signed.apk" -type f | while read -r src; do
            filename=$(basename "$src")
            abi=$(echo "$filename" | sed 's/app-default-//;s/-release-signed.apk//')
            dst="mpvNAS-Player-${abi}-${VERSION_TAG}.apk"
            cp "$src" "$dst"
            echo "✅ Created $dst"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mpv NAS Player ${{ github.ref_name }}
          body: |
            ### 🚀 mpv NAS Player ${{ github.ref_name }} 正式版
            
            基于最新 **mpv v0.41.0** 与 **FFmpeg 8.x** 核心构建。
          files: |
            mpvNAS-Player-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
